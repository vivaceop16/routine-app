*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

let sb;

function initSB() {
  try { sb = window.supabase.createClient(SB_URL, SB_KEY); } catch(e) { console.warn('Supabase init failed', e); }
}

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.style.background = status === 'ok' ? '#4CAF50' : status === 'syncing' ? '#FF9800' : '#CCCCCC';
}

async function cloudLoad() {
  if (!sb || !S.userId) return;
  setSyncStatus('syncing');
  try {
    const [r1, r2, r3] = await Promise.all([
      sb.from('routines').select('data').eq('user_id', S.userId).maybeSingle(),
      sb.from('records').select('date,data').eq('user_id', S.userId),
      sb.from('settings').select('data').eq('user_id', S.userId).maybeSingle(),
    ]);
    if (r1.data?.data) S.routines = r1.data.data;
    if (r2.data) r2.data.forEach(row => { S.records[row.date] = row.data; });
    if (r3.data?.data) S.cfg = { ...S.cfg, ...r3.data.data };
    saveLocal();
    setSyncStatus('ok');
  } catch(e) { console.warn('cloud load:', e); setSyncStatus('off'); }
}

let cloudSaveTimer = null;
function scheduleCloudSave() {
  if (cloudSaveTimer) clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(cloudSave, 1200);
}

async function cloudSave() {
  if (!sb || !S.userId) return;
  setSyncStatus('syncing');
  try {
    const now = new Date().toISOString();
    const ops = [
      sb.from('routines').upsert({ user_id: S.userId, data: S.routines, updated_at: now }),
      sb.from('settings').upsert({ user_id: S.userId, data: S.cfg, updated_at: now }),
    ];
    // Save recent records (last 90 days)
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 90);
    const cutStr = dateStr(cutoff);
    const recEntries = Object.entries(S.records).filter(([d]) => d >= cutStr);
    if (recEntries.length > 0) {
      ops.push(sb.from('records').upsert(
        recEntries.map(([date, data]) => ({ user_id: S.userId, date, data, updated_at: now }))
      ));
    }
    await Promise.all(ops);
    setSyncStatus('ok');
  } catch(e) { console.warn('cloud save:', e); setSyncStatus('off'); }
}

/* ================================================================
   STATE
================================================================ */
let S = { userId:'', routines:[], records:{}, cfg:{ workStart:'10:00', workEnd:'17:00', workDays:[1,2,3,4,5], graceMins:30, notifMins:10, notifOn:false } };
let nav = { bot:'today', sub:'day' };
let nTimers = [], editId = null;

function genUserId() {
  return Math.random().toString(36).slice(2,8).toUpperCase();
}

/* ================================================================
   PERSISTENCE
================================================================ */
function saveLocal() {
  localStorage.setItem('routine-v3', JSON.stringify({ userId:S.userId, routines:S.routines, records:S.records, cfg:S.cfg }));
}

function save() {
  saveLocal();
  scheduleCloudSave();
}

function loadLocal() {
  try {
    const raw = localStorage.getItem('routine-v3');
    if (raw) {
      const p = JSON.parse(raw);
      S.userId   = p.userId || genUserId();
      S.routines = p.routines && p.routines.length ? p.routines : DEF_ROUTINES;
      S.records  = p.records  || {};
      if (p.cfg) S.cfg = { ...S.cfg, ...p.cfg };
    } else {
      // Carry over userId from v2 so sync code stays the same
      try {
        const old = localStorage.getItem('routine-v2');
        const oldData = old ? JSON.parse(old) : null;
        S.userId = oldData?.userId || genUserId();
      } catch(e) { S.userId = genUserId(); }
      S.routines = DEF_ROUTINES;
    }
  } catch(e) { S.userId = genUserId(); S.routines = DEF_ROUTINES; }
}

/* ================================================================
   UTILS
================================================================ */
function dateStr(d) { d=d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n){ return String(n).padStart(2,'0'); }
function mins(t){ const [h,m]=t.split(':').map(Number); return h*60+m; }
function nowMins(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function nowStr(){ const n=new Date(); return pad(n.getHours())+':'+pad(n.getMinutes()); }
function uid(){ return 'r'+Date.now()+Math.random().toString(36).slice(2,6); }
function fmtTime12(t){ if(!t)return ''; const [h,m]=t.split(':').map(Number); const ap=h>=12?'오후':'오전',hh=h%12||12; return `${ap} ${hh}:${String(m).padStart(2,'0')}`; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function routinesForDate(d) {
  const dow=(d||new Date()).getDay();
  return S.routines.filter(r=>r.days.includes(dow)).sort((a,b)=>mins(a.time)-mins(b.time));
}
function getStatus(r, ds) {
  if ((S.records[ds]||{})[r.id]==='done') return 'done';
  const nm=nowMins(), rm=mins(r.time), isToday=ds===dateStr();
  if (isToday && nm>rm+(S.cfg.graceMins||30)) return 'missed';
  return 'upcoming';
}
function isWorkHours() {
  const n=new Date(), dow=n.getDay(), nm=nowMins();
  return S.cfg.workDays.includes(dow) && nm>=mins(S.cfg.workStart) && nm<mins(S.cfg.workEnd);
}
function getStreak(rid) {
  let s=0, t=new Date();
  for(let i=1;i<=365;i++){ const d=new Date(t); d.setDate(d.getDate()-i); if((S.records[dateStr(d)]||{})[rid]==='done') s++; else break; }
  return s;
}
function calcStats(ds,rs){ let done=0,miss=0; for(const r of rs){ const s=getStatus(r,ds); if(s==='done')done++; else if(s==='missed')miss++; } return{done,miss,total:rs.length}; }
function daysLabel(days){ if(days.length===7)return'매일'; if(days.length===5&&[1,2,3,4,5].every(d=>days.includes(d)))return'평일'; if(days.length===2&&days.includes(0)&&days.includes(6))return'주말'; return days.slice().sort((a,b)=>a-b).map(d=>DNAMES[d]).join(', '); }
function weekStart(){ const t=new Date(),dow=t.getDay(),m=new Date(t); m.setDate(t.getDate()-(dow===0?6:dow-1)); return m; }

/* ================================================================
   DAY SCREEN
================================================================ */
function buildDayElems(routines) {
  const ws=mins(S.cfg.workStart), we=mins(S.cfg.workEnd), nm=nowMins(), now=nowStr();
  const isWD=S.cfg.workDays.includes(new Date().getDay());
  const elems=[], flags={ws:!isWD,we:!isWD,now:false};
  for(const r of routines){
    const rm=mins(r.time);
    if(!flags.ws&&rm>=ws){flags.ws=true;elems.push({t:'sep',label:S.cfg.workStart+' 근무 시작',color:'#BBBBBB'});}
    if(!flags.we&&rm>=we){flags.we=true;elems.push({t:'sep',label:S.cfg.workEnd+' 근무 종료',color:'#BBBBBB'});}
    if(!flags.now&&rm>nm){flags.now=true;elems.push({t:'sep',label:'지금 '+now,color:'#E8453C'});}
    elems.push({t:'item',r});
  }
  if(isWD&&!flags.we) elems.push({t:'sep',label:S.cfg.workEnd+' 근무 종료',color:'#BBBBBB'});
  return elems;
}

function renderDay() {
  const el=document.getElementById('sc-day');
  const today=new Date(), ds=dateStr(today), rs=routinesForDate(today);
  const {done,miss,total}=calcStats(ds,rs);
  const dp=total>0?Math.round(done/total*100):0, mp=total>0?Math.round(miss/total*100):0;
  let h=`<div class="card"><div class="card-hdr"><span class="card-lbl">오늘 진행률</span>
    <div class="stat-nums"><span class="sn-done">${done} 완료</span><span class="sn-sep">·</span><span class="sn-miss">${miss} 놓침</span></div>
  </div><div class="prog-bar"><div class="prog-done" style="width:${dp}%"></div><div class="prog-miss" style="width:${mp}%"></div><div class="prog-rest"></div></div></div>
  <div class="sec">오늘의 루틴</div>`;
  if(!rs.length){ h+=`<div class="empty">오늘 예정된 루틴이 없어요<br>루틴 탭에서 추가해보세요</div>`; }
  else {
    const elems=buildDayElems(rs);
    for(let i=0;i<elems.length;i++){
      const e=elems[i], next=elems[i+1];
      if(e.t==='sep'){
        h+=`<div class="sep-row"><div class="sep-left"><div class="sep-lt"></div><div class="sep-gap"></div><div class="sep-dot" style="background:${e.color};"></div><div class="sep-gap"></div><div class="sep-lb"></div></div>
        <div class="sep-right"><div class="sep-hl" style="background:${e.color};"></div><span class="sep-txt" style="color:${e.color};">${e.label}</span><div class="sep-hl" style="background:${e.color};"></div></div></div>`;
      } else {
        const r=e.r, s=getStatus(r,ds), dim=s==='missed'?' dim':'', streak=getStreak(r.id);
        const ck=s==='done'?`<div class="ck-done"><i class="ti ti-check" style="font-size:13px;color:#fff;"></i></div>`:s==='missed'?`<div class="ck-miss"><i class="ti ti-x" style="font-size:12px;color:var(--red);"></i></div>`:`<div class="ck-up"></div>`;
        h+=`<div class="tl-item" onclick="toggle('${r.id}')">${ck}<div class="ic${dim}"><div class="isq"><i class="ti ${r.icon}" style="font-size:18px;color:${r.ic};"></i></div>
        <div class="itxt"><div class="iname">${esc(r.name)}</div><div class="istreak">${streak>0?'스트릭 '+streak+'일':fmtTime12(r.time)}</div></div>
        <div class="idur"><i class="ti ti-clock" style="font-size:13px;color:#BBBBBB;"></i><span>${r.dur}분</span></div></div></div>`;
        if(next&&next.t==='item') h+=`<div class="conn"><div class="conn-line"></div></div>`;
      }
    }
  }
  el.innerHTML=h;
}

function toggle(rid) {
  const ds=dateStr(), r=S.routines.find(x=>x.id===rid); if(!r) return;
  if(!S.records[ds]) S.records[ds]={};
  if(getStatus(r,ds)==='done') delete S.records[ds][rid]; else S.records[ds][rid]='done';
  save(); renderDay();
}

/* ================================================================
   WEEK SCREEN
================================================================ */
function renderWeek() {
  const el=document.getElementById('sc-week');
  const mon=weekStart(), today=dateStr();
  let rows='', totalDone=0, totalMiss=0, totalItems=0;
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const ds=dateStr(d), isToday=ds===today, isFuture=ds>today;
    const rs=routinesForDate(d), done=rs.filter(r=>(S.records[ds]||{})[r.id]==='done').length;
    const tot=rs.length, pct=tot>0?Math.round(done/tot*100):0;
    const miss=rs.filter(r=>getStatus(r,ds)==='missed').length;
    if(!isFuture&&tot>0){totalDone+=done;totalItems+=tot;totalMiss+=miss;}
    rows+=`<div class="wrow"><span class="wd" style="color:${isToday?'#111':'#999'};font-weight:${isToday?500:400};">${DNAMES[d.getDay()]}</span>
    <span class="wdt">${d.getDate()}</span>
    <div class="wbar">${(!isFuture&&tot>0)?`<div class="wfill" style="width:${pct}%;background:${isToday?'#E8453C':'#CCCCCC'};"></div>`:''}</div>
    <span class="wfrac">${(isFuture||tot===0)?'—':done+'/'+tot}</span></div>`;
  }
  const pct=totalItems>0?Math.round(totalDone/totalItems*100):0;
  el.innerHTML=`<div class="sec">이번 주</div>${rows}
  <div class="sum-card"><div class="sum-inner"><div><div class="sum-lbl">주간 완료율</div><div class="sum-counts">
  <div class="cnt"><div class="cnt-dot" style="background:#111;"></div><span class="cnt-val" style="color:#111;">${totalDone} 완료</span></div>
  <div class="cnt"><div class="cnt-dot" style="background:var(--red);"></div><span class="cnt-val" style="color:var(--red);">${totalMiss} 놓침</span></div>
  </div></div><div class="sum-pct">${pct}%</div></div></div>`;
}

/* ================================================================
   MONTH SCREEN
================================================================ */
function renderMonth() {
  const el=document.getElementById('sc-month');
  const now=new Date(), yr=now.getFullYear(), mo=now.getMonth();
  const first=new Date(yr,mo,1), lastDay=new Date(yr,mo+1,0).getDate();
  const offset=(first.getDay()+6)%7, today=dateStr();
  let cells='', totalDone=0, totalMiss=0, totalItems=0;
  for(let i=0;i<offset;i++) cells+='<div></div>';
  for(let day=1;day<=lastDay;day++){
    const d=new Date(yr,mo,day), ds=dateStr(d), isToday=ds===today, isFuture=ds>today;
    const rs=routinesForDate(d), done=rs.filter(r=>(S.records[ds]||{})[r.id]==='done').length, tot=rs.length;
    const pct=tot>0?Math.round(done/tot*100):0;
    const miss=rs.filter(r=>getStatus(r,ds)==='missed').length;
    if(!isFuture&&tot>0){totalDone+=done;totalItems+=tot;totalMiss+=miss;}
    let bg='transparent',tc='#CCCCCC',brd='none';
    if(isToday){brd='1px solid var(--red)';tc='var(--red)';}
    else if(!isFuture&&tot>0){ if(pct>=80){bg='#FFE8E8';tc='#E8453C';} else if(pct>=50){bg='#F5F5F5';tc='#888';} else{bg='#F5F5F5';tc='#CCC';} }
    cells+=`<div class="cal-cell" style="background:${bg};border:${brd};"><span style="color:${tc};">${day}</span></div>`;
  }
  const pct=totalItems>0?Math.round(totalDone/totalItems*100):0, streak=calcStreak();
  el.innerHTML=`<div class="sec">${MONTHS[mo]}</div>
  <div class="cal-hdr"><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span class="wknd">토</span><span class="wknd">일</span></div>
  <div class="cal-grid">${cells}</div>
  <div class="sum-card"><div class="sum-inner"><div><div class="sum-lbl">월간 완료율</div>
  <div class="sum-counts" style="margin-bottom:${streak>0?8:0}px;">
  <div class="cnt"><div class="cnt-dot" style="background:#111;"></div><span class="cnt-val" style="color:#111;">${totalDone} 완료</span></div>
  <div class="cnt"><div class="cnt-dot" style="background:var(--red);"></div><span class="cnt-val" style="color:var(--red);">${totalMiss} 놓침</span></div>
  </div>${streak>0?`<div class="streak-row"><i class="ti ti-flame" style="font-size:14px;color:var(--red);"></i><span>연속 ${streak}일 달성 중</span></div>`:''}</div>
  <div class="sum-pct">${pct}%</div></div></div>`;
}

function calcStreak() {
  let s=0; const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today); d.setDate(d.getDate()-i);
    const ds=dateStr(d), rs=routinesForDate(d);
    if(!rs.length) continue;
    if(rs.every(r=>(S.records[ds]||{})[r.id]==='done')) s++;
    else if(ds!==dateStr()) break;
  }
  return s;
}

function switchBot(tab) {
  nav.bot=tab; renderSubtabs(); renderBNav();
  const scr=tab==='today'?nav.sub:tab;
  showScreen(scr);
  if(scr==='day')renderDay();
  if(scr==='week')renderWeek(); if(scr==='month')renderMonth();
  if(scr==='routine')renderRoutineList(); if(scr==='settings')renderSettings();
  const fab=document.getElementById('fab');
  if(fab) fab.classList.toggle('hidden', scr!=='routine');
}
function switchSub(tab) {
  nav.sub=tab; renderSubtabs(); showScreen(tab);
  if(tab==='week')renderWeek(); if(tab==='month')renderMonth();
}
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  const el=document.getElementById('sc-'+name); if(el) el.classList.add('on');
}
function renderAll() { renderDay(); renderRoutineList(); renderSettings(); if(nav.sub==='week')renderWeek(); if(nav.sub==='month')renderMonth(); }

   MODAL — ROUTINE ADD/EDIT
================================================================ */
function openAdd(){ editId=null; showSheet(routineForm(null)); }
function openEdit(id){ editId=id; showSheet(routineForm(S.routines.find(r=>r.id===id))); }

function routineForm(r) {
  const name=r?.name||'', time=r?.time||'08:00', dur=r?.dur||30;
  const cat=r?.cat||'personal', days=r?.days||[1,2,3,4,5];
  const icon=r?.icon||'ti-heart', ic=r?.ic||'#C8693A';
  const dayCh=DNAMES.map((d,i)=>`<button type="button" class="dchip${days.includes(i)?' on':''}" onclick="this.classList.toggle('on')">${d}</button>`).join('');
  const icons=ICON_OPTS.map(o=>`<div class="iopt${o.i===icon?' on':''}" onclick="pickIcon('${o.i}','${o.c}',this)"><i class="ti ${o.i}" style="font-size:18px;color:${o.c};"></i></div>`).join('');
  return `<div class="sheet-hdl"></div><div class="sheet-title">${r?'루틴 수정':'루틴 추가'}</div>
  <div class="fg"><div class="flbl">이름</div><input class="finput" id="fn" placeholder="루틴 이름" value="${esc(name)}"></div>
  <div class="fg"><div class="flbl">시간</div><input class="finput" id="ft" type="time" value="${time}"></div>
  <div class="fg"><div class="flbl">소요 시간 (분)</div><input class="finput" id="fd" type="number" value="${dur}" min="1" max="480"></div>
  <div class="fg"><div class="flbl">카테고리</div><select class="fsel" id="fc"><option value="personal"${cat==='personal'?' selected':''}>개인</option><option value="work"${cat==='work'?' selected':''}>업무</option></select></div>
  <div class="fg"><div class="flbl">반복 요일</div><div class="day-chips" id="dchips">${dayCh}</div></div>
  <div class="fg"><div class="flbl">아이콘</div><div class="icon-grid" id="ipick">${icons}</div>
  <input type="hidden" id="fi" value="${icon}"><input type="hidden" id="fic" value="${ic}"></div>
  <button class="btn-p" onclick="saveRoutine()">저장</button>
  ${r?`<button class="btn-d" onclick="delRoutine('${r.id}')">삭제</button>`:''}`;
}

function pickIcon(icon,ic,el) {
  document.querySelectorAll('.iopt').forEach(d=>d.classList.remove('on'));
  el.classList.add('on'); document.getElementById('fi').value=icon; document.getElementById('fic').value=ic;
}

function saveRoutine() {
  const name=document.getElementById('fn').value.trim();
  if(!name){toast('이름을 입력해주세요');return;}
  const time=document.getElementById('ft').value, dur=parseInt(document.getElementById('fd').value)||30;
  const cat=document.getElementById('fc').value, icon=document.getElementById('fi').value, ic=document.getElementById('fic').value;
  const days=[];
  document.querySelectorAll('#dchips .dchip.on').forEach(b=>{ const i=DNAMES.indexOf(b.textContent); if(i>=0)days.push(i); });
  if(!days.length){toast('요일을 선택해주세요');return;}
  if(editId){ const i=S.routines.findIndex(r=>r.id===editId); if(i>=0) S.routines[i]={...S.routines[i],name,time,dur,cat,icon,ic,days}; }
  else { S.routines.push({id:uid(),name,time,dur,cat,icon,ic,days,notif:true}); }
  S.routines.sort((a,b)=>mins(a.time)-mins(b.time));
  save(); closeSheet(); renderRoutineList(); renderDay(); toast('저장됐어요'); scheduleNotifs();
}

function delRoutine(id) {
  if(!confirm('이 루틴을 삭제할까요?'))return;
  S.routines=S.routines.filter(r=>r.id!==id); save(); closeSheet(); renderRoutineList(); renderDay();
}

function editCfg(key) {
  const c=S.cfg; let html='';
  if(key==='workStart'||key==='workEnd'){
    const lbl=key==='workStart'?'근무 시작':'근무 종료';

  } else if(key==='graceMins'||key==='notifMins'){
    const lbl=key==='graceMins'?'유예 시간 (분)':'미리 알림 (분)';
    html=`<div class="sheet-hdl"></div><div class="sheet-title">${lbl}</div><div class="fg"><input class="finput" id="cfgval" type="number" value="${c[key]}" min="0" max="120"></div><button class="btn-p" onclick="saveCfg('${key}')">저장</button>`;
  } else if(key==='workDays'){
    const btns=DNAMES.map((d,i)=>`<button type="button" class="dchip${c.workDays.includes(i)?' on':''}" onclick="this.classList.toggle('on')">${d}</button>`).join('');
    html=`<div class="sheet-hdl"></div><div class="sheet-title">근무 요일</div><div class="fg"><div class="day-chips" id="dchips">${btns}</div></div><button class="btn-p" onclick="saveWDays()">저장</button>`;
  } else if(key==='syncCode'){
    html=`<div class="sheet-hdl"></div><div class="sheet-title">동기화 코드 입력</div>
    <div class="fg"><div class="flbl">맥에서 표시된 코드를 입력하세요</div>
    <input class="finput" id="cfgval" placeholder="XXXXXX" maxlength="8" style="text-transform:uppercase;letter-spacing:2px;font-size:20px;text-align:center;"></div>
    <button class="btn-p" onclick="applySyncCode()">연결</button>`;
  }
  showSheet(html);
}

function saveCfg(key) {
  const v=document.getElementById('cfgval').value;
  S.cfg[key]=isNaN(v)||v===''?v:parseInt(v);
  save(); closeSheet(); renderSettings(); renderDay(); toast('저장됐어요');
}
function saveWDays() {
  const days=[]; document.querySelectorAll('#dchips .dchip.on').forEach(b=>{ const i=DNAMES.indexOf(b.textContent); if(i>=0)days.push(i); });
  S.cfg.workDays=days; save(); closeSheet(); renderSettings(); renderDay(); toast('저장됐어요');
}
async function applySyncCode() {
  const code=(document.getElementById('cfgval').value||'').trim().toUpperCase();
  if(code.length<4){toast('코드를 입력해주세요');return;}
  S.userId=code; saveLocal();
  closeSheet(); toast('연결 중...');
  await cloudLoad(); renderAll(); toast('동기화 완료');
}

/* ================================================================
   NOTIFICATIONS
================================================================ */
function toggleNotif() {
  if(!S.cfg.notifOn) reqNotif();
  else { S.cfg.notifOn=false; save(); clearTimers(); renderSettings(); }
}
function reqNotif() {
  if(!('Notification' in window)){toast('이 브라우저는 알림을 지원하지 않아요');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){S.cfg.notifOn=true;save();scheduleNotifs();renderSettings();toast('알림이 켜졌어요');}
    else toast('알림 권한이 필요해요');
  });
}
function clearTimers(){ nTimers.forEach(t=>clearTimeout(t)); nTimers=[]; }
function scheduleNotifs() {
  clearTimers();
  if(!S.cfg.notifOn||Notification.permission!=='granted') return;
  const rs=routinesForDate(), adv=S.cfg.notifMins||10, nm=nowMins();
  for(const r of rs){
    if(!r.notif) continue;
    const diff=(mins(r.time)-adv-nm)*60000; if(diff<=0) continue;
    nTimers.push(setTimeout(()=>{ new Notification(r.name,{body:`${r.time} 시작 · ${r.dur}분 · ${isWorkHours()?'맥 알림':'아이폰 알림'}`,tag:r.id}); },diff));
  }
}

/* ================================================================
   SHEET / OVERLAY
================================================================ */
function showSheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('overlay').classList.add('on'); }
function closeSheet(){ document.getElementById('overlay').classList.remove('on'); }
function overlayClick(e){ if(e.target===document.getElementById('overlay')) closeSheet(); }

/* ================================================================
   TOAST
================================================================ */
let toastT=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); if(toastT)clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('on'),2200); }

/* ================================================================
   INIT
================================================================ */
async function init() {
  initSB();
  loadLocal();
  renderHeader(); renderSubtabs(); renderBNav(); renderDay(); showScreen('day');
  scheduleNotifs();
  // Load from cloud (non-blocking, re-renders after)
  cloudLoad().then(()=>{ renderAll(); });
  // Auto-refresh every minute
  setInterval(()=>{ renderHeader(); if(nav.bot==='today'&&nav.sub==='day') renderDay(); }, 60000);
  // Periodic cloud pull every 30 seconds
  setInterval(()=>{ cloudLoad().then(()=>{ if(nav.bot==='today'&&nav.sub==='day')renderDay(); }); }, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
